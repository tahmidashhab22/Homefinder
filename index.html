        /* Fullscreen Lightbox with Navigation Arrows */

<body>
    <div id="app"></div>

    <script>
        // ========== STORAGE KEYS ==========
        const STORAGE_USERS = "homefinder_users";
        const STORAGE_CURRENT_USER = "homefinder_current_user";
        const STORAGE_HOUSES = "homefinder_houses";
        const STORAGE_FAVORITES = "homefinder_favorites";

        // ========== DEFAULT DATA ==========
        const DEFAULT_USERS = [
            { id: 1, name: "রহিম মিয়া", username: "rahim", password: "1234", email: "rahim@example.com", phone: "01712345678" }
        ];

        const DEFAULT_HOUSES = [];

        // ========== IMAGE OPTIMIZATION ==========
        const MAX_IMAGES = 4;
        const MAX_IMAGE_SIZE_MB = 0.8;

        function resizeImage(file, maxWidth = 600, maxHeight = 450, quality = 0.6) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        let width = img.width;
                        let height = img.height;
                        
                        if (width > height) {
                            if (width > maxWidth) {
                                height = Math.round(height * (maxWidth / width));
                                width = maxWidth;
                            }
                        } else {
                            if (height > maxHeight) {
                                width = Math.round(width * (maxHeight / height));
                                height = maxHeight;
                            }
                        }
                        
                        const canvas = document.createElement('canvas');
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        const reducedDataUrl = canvas.toDataURL('image/jpeg', quality);
                        resolve(reducedDataUrl);
                    };
                    img.onerror = reject;
                };
                reader.onerror = reject;
            });
        }

        // Helper Functions
        function loadUsers() {
            const stored = localStorage.getItem(STORAGE_USERS);
            if (stored) return JSON.parse(stored);
            localStorage.setItem(STORAGE_USERS, JSON.stringify(DEFAULT_USERS));
            return [...DEFAULT_USERS];
        }
        function saveUsers(users) { localStorage.setItem(STORAGE_USERS, JSON.stringify(users)); }

        function getCurrentUser() {
            const user = localStorage.getItem(STORAGE_CURRENT_USER);
            return user ? JSON.parse(user) : null;
        }
        function setCurrentUser(user) {
            if (user) localStorage.setItem(STORAGE_CURRENT_USER, JSON.stringify(user));
            else localStorage.removeItem(STORAGE_CURRENT_USER);
        }

        function loadHouses() {
            const stored = localStorage.getItem(STORAGE_HOUSES);
            if (stored) return JSON.parse(stored);
            localStorage.setItem(STORAGE_HOUSES, JSON.stringify(DEFAULT_HOUSES));
            return [...DEFAULT_HOUSES];
        }
        
        function saveHouses(houses) {
            try {
                localStorage.setItem(STORAGE_HOUSES, JSON.stringify(houses));
                return true;
            } catch (error) {
                if (error.name === 'QuotaExceededError') {
                    alert("স্টোরেজ ফুল! দয়া করে কিছু পুরনো লিস্টিং ডিলিট করুন।");
                    return false;
                }
                throw error;
            }
        }

        function loadFavorites() { 
            const fav = localStorage.getItem(STORAGE_FAVORITES);
            return fav ? JSON.parse(fav) : []; 
        }
        function saveFavorites(fav) { localStorage.setItem(STORAGE_FAVORITES, JSON.stringify(fav)); }

        // Auth Functions
        function registerUser(name, username, password, email, phone) {
            const users = loadUsers();
            if (users.find(u => u.username === username)) return false;
            const newUser = { id: Date.now(), name, username, password, email, phone };
            users.push(newUser);
            saveUsers(users);
            return true;
        }
        
        function loginUser(username, password) {
            const users = loadUsers();
            const user = users.find(u => u.username === username && u.password === password);
            if (user) {
                setCurrentUser({ id: user.id, name: user.name, username: user.username, email: user.email, phone: user.phone });
                return true;
            }
            return false;
        }
        
        function logout() { 
            setCurrentUser(null); 
            renderApp(); 
        }
        
        function updateProfile(currentUser, newData) {
            const users = loadUsers();
            const userIndex = users.findIndex(u => u.id === currentUser.id);
            if (userIndex !== -1) {
                users[userIndex] = { ...users[userIndex], ...newData };
                saveUsers(users);
                setCurrentUser({ ...currentUser, ...newData });
                renderApp();
                return true;
            }
            return false;
        }

        // Listing CRUD
        function addHouse(houseData, currentUser) {
            const houses = loadHouses();
            const newHouse = {
                id: Date.now(),
                title: houseData.title,
                rent: parseFloat(houseData.rent),
                location: houseData.location,
                rooms: parseInt(houseData.rooms),
                description: houseData.description || "বাড়ি ভাড়া দেওয়া হবে",
                phone: houseData.phone,
                listerId: currentUser.id,
                listerName: currentUser.name,
                whatsapp: houseData.whatsapp,
                images: houseData.images && houseData.images.length ? houseData.images : []
            };
            houses.push(newHouse);
            const saved = saveHouses(houses);
            if (saved) {
                alert("✅ নতুন লিস্টিং সফলভাবে তৈরি হয়েছে!");
                renderApp();
            }
            return newHouse;
        }

        async function updateHouse(houseId, updatedData, currentUser) {
            const houses = loadHouses();
            const houseIndex = houses.findIndex(h => h.id === houseId);
            if (houseIndex !== -1 && houses[houseIndex].listerId === currentUser.id) {
                houses[houseIndex] = { ...houses[houseIndex], ...updatedData };
                const saved = saveHouses(houses);
                if (saved) {
                    alert("✅ লিস্টিং আপডেট হয়েছে!");
                    renderApp();
                }
                return true;
            }
            return false;
        }

        function deleteHouse(houseId, currentUser) {
            const houses = loadHouses();
            const house = houses.find(h => h.id === houseId);
            if (house && house.listerId === currentUser.id) {
                if (confirm("আপনি কি এই লিস্টিং ডিলিট করতে চান?")) {
                    const updated = houses.filter(h => h.id !== houseId);
                    saveHouses(updated);
                    let favs = loadFavorites();
                    favs = favs.filter(id => id !== houseId);
                    saveFavorites(favs);
                    renderApp();
                    alert("✅ লিস্টিং ডিলিট করা হয়েছে!");

            if (tempOptimizedImages.length + files.length > MAX_IMAGES) {

                return false;

            for (const file of files) {
                const sizeInMB = file.size / (1024 * 1024);
                if (sizeInMB > MAX_IMAGE_SIZE_MB) {
                    alert(`"${file.name}" খুব বড় (${sizeInMB.toFixed(1)}MB)। ${MAX_IMAGE_SIZE_MB}MB এর কম ছবি নির্বাচন করুন।`);

        // ========== FULLSCREEN LIGHTBOX WITH NAVIGATION ARROWS ==========
        function showLightbox(images, startIndex) {
            if (!images || images.length === 0) return;
            
            currentLightboxImages = images;
            currentLightboxIndex = startIndex;
            
            let lightbox = document.getElementById("globalLightbox");
            if (!lightbox) {
                lightbox = document.createElement("div");
                lightbox.id = "globalLightbox";
                lightbox.className = "lightbox";
                lightbox.innerHTML = `
                    <span class="close-lightbox"><i class="fas fa-times"></i></span>
                    <div class="lightbox-counter" id="lightboxCounter"></div>
                    <div class="lightbox-container">
                        <img id="lightboxImg" class="lightbox-img" src="" alt="Fullscreen Image">
                    </div>
                    <button class="lightbox-arrow lightbox-arrow-left" id="lightboxPrev"><i class="fas fa-chevron-left"></i></button>
                    <button class="lightbox-arrow lightbox-arrow-right" id="lightboxNext"><i class="fas fa-chevron-right"></i></button>
                    <div class="lightbox-nav">
                        <button id="lightboxNavPrev"><i class="fas fa-chevron-left"></i> আগের</button>
                        <button id="lightboxNavNext">পরের <i class="fas fa-chevron-right"></i></button>
                    </div>
                `;
                document.body.appendChild(lightbox);
            }
            
            const lightboxImg = document.getElementById("lightboxImg");
            const counter = document.getElementById("lightboxCounter");
            const closeBtn = document.querySelector(".close-lightbox");
            const prevBtn = document.getElementById("lightboxPrev");
            const nextBtn = document.getElementById("lightboxNext");
            const navPrevBtn = document.getElementById("lightboxNavPrev");
            const navNextBtn = document.getElementById("lightboxNavNext");
            
            const updateLightbox = () => {
                lightboxImg.src = currentLightboxImages[currentLightboxIndex];
                counter.innerText = `${currentLightboxIndex + 1} / ${currentLightboxImages.length}`;
            };
            
            const nextImage = () => {
                if (currentLightboxImages.length <= 1) return;
                currentLightboxIndex = (currentLightboxIndex + 1) % currentLightboxImages.length;
                updateLightbox();
            };
            
            const prevImage = () => {
                if (currentLightboxImages.length <= 1) return;
                currentLightboxIndex = (currentLightboxIndex - 1 + currentLightboxImages.length) % currentLightboxImages.length;
                updateLightbox();
            };
            
            const closeLightbox = () => {
                lightbox.classList.remove("active");
                document.removeEventListener('keydown', keyHandler);
            };
            
            const keyHandler = (e) => {
                if(!lightbox.classList.contains("active")) return;
                if(e.key === "ArrowRight") nextImage();
                if(e.key === "ArrowLeft") prevImage();
                if(e.key === "Escape") closeLightbox();
            };
            
            prevBtn.onclick = prevImage;
            nextBtn.onclick = nextImage;
            navPrevBtn.onclick = prevImage;
            navNextBtn.onclick = nextImage;
            closeBtn.onclick = closeLightbox;
            lightbox.onclick = (e) => { if(e.target === lightbox) closeLightbox(); };
            document.addEventListener('keydown', keyHandler);
            
            updateLightbox();
            lightbox.classList.add("active");
        }

        // ========== SHOW GALLERY WITH ARROWS INSIDE CARD ==========
        function showGallery(houseId, images, startIndex) {
            if (!images || images.length === 0) return;
            // Create or get gallery container for this card
            const galleryContainer = document.getElementById(`gallery-${houseId}`);
            if (!galleryContainer) return;
            
            let currentIdx = startIndex;
            const mainImg = document.getElementById(`main-img-${houseId}`);
            const counterSpan = document.getElementById(`counter-${houseId}`);
            
            const updateImage = () => {
                if (mainImg) mainImg.src = images[currentIdx];
                if (counterSpan) counterSpan.innerText = `${currentIdx+1} / ${images.length}`;
            };
            
            const leftArrow = document.getElementById(`left-arrow-${houseId}`);
            const rightArrow = document.getElementById(`right-arrow-${houseId}`);
            
            if (leftArrow) {
                leftArrow.onclick = (e) => {
                    e.stopPropagation();
                    currentIdx = (currentIdx - 1 + images.length) % images.length;
                    updateImage();
                };
            }
            if (rightArrow) {
                rightArrow.onclick = (e) => {
                    e.stopPropagation();
                    currentIdx = (currentIdx + 1) % images.length;
                    updateImage();
                };
            }
            
            updateImage();
        }

                const images = house.images && house.images.length ? house.images : ["https://images.unsplash.com/photo-1568605114967-8130f3a36994?w=500&h=300&fit=crop"];
                let currentIdx = 0;
                const mainImg = document.getElementById(`main-img-${house.id}`);
                const counterSpan = document.getElementById(`counter-${house.id}`);
                const leftArrow = document.getElementById(`left-arrow-${house.id}`);
                const rightArrow = document.getElementById(`right-arrow-${house.id}`);
                
                const updateImage = () => {
                    if (mainImg) mainImg.src = images[currentIdx];
                    if (counterSpan) counterSpan.innerText = `${currentIdx+1} / ${images.length}`;
                };
                
                if (leftArrow) {
                    leftArrow.onclick = (e) => {
                        e.stopPropagation();
                        currentIdx = (currentIdx - 1 + images.length) % images.length;
                        updateImage();
                    };
                }
                if (rightArrow) {
                    rightArrow.onclick = (e) => {
                        e.stopPropagation();
                        currentIdx = (currentIdx + 1) % images.length;
                        updateImage();
                    };
                }
                updateImage();
            });
            
            attachEvents(currentUser);
        }

        function attachEvents(currentUser) {
            document.getElementById("navHome")?.addEventListener("click", () => { currentPage = "home"; showListingForm = false; editingHouse = null; tempOptimizedImages = []; renderApp(); });
            document.getElementById("navDashboard")?.addEventListener("click", () => { currentPage = "dashboard"; showListingForm = false; editingHouse = null; tempOptimizedImages = []; renderApp(); });
            document.getElementById("navProfile")?.addEventListener("click", () => { currentPage = "profile"; showListingForm = false; editingHouse = null; tempOptimizedImages = []; renderApp(); });
            document.getElementById("logoutBtn")?.addEventListener("click", () => logout());
            document.getElementById("newListingBtn")?.addEventListener("click", () => { showListingForm = true; editingHouse = null; tempOptimizedImages = []; currentPage = "home"; renderApp(); });
            document.getElementById("cancelListingBtn")?.addEventListener("click", () => { showListingForm = false; editingHouse = null; tempOptimizedImages = []; renderApp(); });
            
            document.getElementById("filterBtn")?.addEventListener("click", () => {
                searchLocation = document.getElementById("searchInput")?.value || "";
                minRent = document.getElementById("minRentInput")?.value || "";
                maxRent = document.getElementById("maxRentInput")?.value || "";
                renderApp();
            });
            
            const uploadArea = document.getElementById("multiUploadArea");
            const fileInput = document.getElementById("multiImageInput");
            if (uploadArea && fileInput) {
                uploadArea.addEventListener("click", () => fileInput.click());
                fileInput.addEventListener("change", async (e) => {
                    const files = Array.from(e.target.files);
                    await handleImageUpload(files);
                    fileInput.value = "";
                });
            }
            
            document.getElementById("saveListingBtn")?.addEventListener("click", async () => {
                const title = document.getElementById("editTitle")?.value.trim();
                const rent = document.getElementById("editRent")?.value.trim();
                const location = document.getElementById("editLocation")?.value.trim();
                const rooms = document.getElementById("editRooms")?.value.trim();
                const phone = document.getElementById("editPhone")?.value.trim();
                const whatsapp = document.getElementById("editWhatsapp")?.value.trim();
                const desc = document.getElementById("editDesc")?.value.trim();
                
                if (!title || !rent || !location || !rooms || !phone || !whatsapp || !desc) { 
                    alert("সব তথ্য পূরণ করুন!"); 
                    return; 
                }
                
                if (editingHouse) {
                    await updateHouse(editingHouse.id, { 
                        title, rent: parseFloat(rent), location, rooms: parseInt(rooms), 
                        phone, whatsapp, description: desc, 
                        images: tempOptimizedImages.length ? tempOptimizedImages : editingHouse.images 
                    }, currentUser);
                } else {
                    await addHouse({ title, rent, location, rooms, phone, whatsapp, description: desc, images: tempOptimizedImages }, currentUser);
                }
                showListingForm = false;
                tempOptimizedImages = [];
                renderApp();
            });
            
            document.getElementById("saveProfileBtn")?.addEventListener("click", () => {
                const name = document.getElementById("profileName")?.value.trim();
                const email = document.getElementById("profileEmail")?.value.trim();
                const phone = document.getElementById("profilePhone")?.value.trim();
                const password = document.getElementById("profilePassword")?.value.trim();
                const updateData = { name, email, phone };
                if (password) updateData.password = password;
                updateProfile(currentUser, updateData);
                alert("✅ প্রোফাইল আপডেট হয়েছে!");
            });
            
            document.querySelectorAll(".favorite-btn").forEach(btn => btn.addEventListener("click", (e) => { e.stopPropagation(); toggleFavorite(parseInt(btn.dataset.id)); }));
            document.querySelectorAll(".btn-edit").forEach(btn => btn.addEventListener("click", (e) => {
                const id = parseInt(btn.dataset.id);
                const house = loadHouses().find(h => h.id === id);
                if (house) { editingHouse = house; showListingForm = true; tempOptimizedImages = house.images || []; currentPage = "home"; renderApp(); }
            }));
            document.querySelectorAll(".btn-danger").forEach(btn => btn.addEventListener("click", (e) => { deleteHouse(parseInt(btn.dataset.id), currentUser); }));
            document.querySelectorAll(".whatsapp-btn").forEach(btn => btn.addEventListener("click", (e) => { openWhatsapp(btn.dataset.whatsapp, btn.dataset.title, btn.dataset.location); }));
            document.querySelectorAll(".call-btn").forEach(btn => btn.addEventListener("click", () => { makePhoneCall(btn.dataset.phone); }));
            document.querySelectorAll(".remove-img-btn").forEach(btn => btn.addEventListener("click", (e) => {
                e.stopPropagation();
                removeImageAtIndex(parseInt(btn.dataset.index));
            }));
        }

        function escapeHtml(str) { 
            if (!str) return ""; 
            return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'); 
        }
        
        renderApp();
    </script>
</body>
</html>
